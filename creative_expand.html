<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #8e44ad;
            font-family: Arial, sans-serif;
        }
        .btn {
            height: 36px;
            margin-top: 60px;
            padding: 0 10px;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-close { background: #e74c3c; }
        .btn-open { background: #3498db; }
        .btn-link { background: #2ecc71; }
        .btn-window { background: #f39c12; }
    </style>
</head>
<body>
    <button class="btn btn-close" onclick="mraid.close()">Close</button>
    <button class="btn btn-open" onclick="mraid.open('https://google.com')">Open</button>
    <a class="btn btn-link" href="https://google.com">Link</a>
    <button class="btn btn-window" onclick="window.open('https://google.com')">Window</button>
</body>
</html>
